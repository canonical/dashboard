name: Integration tests

on:
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: "0 15 * * SAT"

jobs:
  integration-tests:
    runs-on: [self-hosted, xlarge]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ./charm
        run: |
          python -m pip install --upgrade pip
          pip install tox virtualenv

      - name: Install toolchain
        run: |
          sudo snap install rockcraft --classic
          sudo snap install charmcraft --classic
          sudo snap install microk8s --channel=1.35/stable --classic
          sudo microk8s enable dns
          sudo microk8s enable registry
          sudo microk8s enable hostpath-storage
          # Install Juju as a plain binary so it can talk to classic-snap MicroK8s
          curl -fL -o /tmp/juju.tar.xz https://github.com/juju/juju/releases/download/v3.6.21/juju-3.6.21-linux-amd64.tar.xz
          sudo tar -xf /tmp/juju.tar.xz -C /usr/local/bin juju
          # Install build tools needed by Python deps (e.g. backports.datetime_fromisoformat)
          sudo apt-get install -y gcc python3-dev python3-venv

      - name: Wait for MicroK8s to be ready
        run: |
          sudo microk8s kubectl wait --for=condition=Ready node --all --timeout=300s
          sudo microk8s kubectl get nodes
          sudo microk8s kubectl -n container-registry rollout status deployment/registry --timeout=300s

      - name: Setup Juju
        run: |
          mkdir -p ~/.local/share/juju ~/.kube
          sudo microk8s config > ~/.kube/config
          chmod 600 ~/.kube/config
          juju add-k8s localk8s --client --cloud=kubernetes --storage=microk8s-hostpath
          juju bootstrap localk8s test-controller

      - name: Pack rock and charm artifacts
        run: |
          rockcraft pack
          cd charm
          charmcraft pack

      - name: Publish rock to MicroK8s registry
        run: |
          ROCK_FILE=$(ls -1 dashboard_*.rock | head -n1)
          rockcraft.skopeo --insecure-policy copy --dest-tls-verify=false \
            oci-archive:${ROCK_FILE} \
            docker://127.0.0.1:32000/dashboard:ci

      - name: Fetch charm libraries
        working-directory: ./charm
        run: |
          charmcraft fetch-lib charms.tempo_coordinator_k8s.v0.tracing
          charmcraft fetch-lib charms.smtp_integrator.v0.smtp
          charmcraft fetch-lib charms.openfga_k8s.v1.openfga
          charmcraft fetch-lib charms.hydra.v0.oauth
          charmcraft fetch-lib charms.squid_forward_proxy.v0.http_proxy

      - name: Run integration tests
        working-directory: ./charm
        run: |
          CHARM_FILE=$(ls -1 dashboard_*.charm | head -n1)
          tox -e integration -- \
            --charm-file "${CHARM_FILE}" \
            --dashboard-image 127.0.0.1:32000/dashboard:ci \
            tests/integration/test_charm.py \
            tests/integration/test_oauth.py

      - name: Cleanup Juju
        if: always()
        run: |
          juju destroy-controller test-controller --destroy-all-models --force --no-prompt || true

  allure-report:
    if: ${{ !cancelled() && github.event_name == 'schedule' }}
    needs: integration-tests
    runs-on: [self-hosted, xlarge]
    steps:
      - name: Generate Allure Report
        run: |
          echo "Allure report generation would go here"
